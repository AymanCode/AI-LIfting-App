name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests and assemble debug APKs
        run: ./gradlew testDebugUnitTest assembleDebug assembleDebugAndroidTest

      - name: Verify pinned APK signer
        run: ./scripts/ci/verify-apk-signer.sh

      - name: Verify APK update compatibility metadata
        run: ./scripts/ci/verify-apk-compatibility.sh

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: build/reports/tests/testDebugUnitTest/

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ecolift-debug-apk
          path: build/outputs/apk/debug/*.apk

      - name: Upload debug androidTest APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ecolift-debug-android-test-apk
          path: build/outputs/apk/androidTest/debug/*.apk
