name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests and assemble debug APKs
        run: ./gradlew testDebugUnitTest assembleDebug assembleDebugAndroidTest

      - name: Verify APK update path on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: ./scripts/ci/verify-apk-update.sh

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: build/reports/tests/testDebugUnitTest/

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: build/reports/androidTests/connected/

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ecolift-debug-apk
          path: build/outputs/apk/debug/*.apk
